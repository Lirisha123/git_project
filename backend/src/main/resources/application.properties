spring.application.name=repository-insight-dashboard
server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/repository_dashboard}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

app.github.api-base-url=${GITHUB_API_BASE_URL:https://api.github.com}
app.github.token=${GITHUB_TOKEN:}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
