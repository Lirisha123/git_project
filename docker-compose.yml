version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: insight-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-insight_dashboard}
      MYSQL_USER: ${MYSQL_USER:-insight}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-insightpass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-p${MYSQL_ROOT_PASSWORD:-rootpass}']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: insight-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-insight_dashboard}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-insight}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-insightpass}
      SPRING_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_H2_CONSOLE_ENABLED: false
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4173,http://localhost:5173,http://localhost:3000}
    ports:
      - '8080:8080'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: insight-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '4173:80'

volumes:
  mysql_data:
